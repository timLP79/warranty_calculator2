<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Warranty Calculator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#f0ebe1">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4PYVD5K98X"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-4PYVD5K98X');
    </script>
</head>
<body>
    <div class="page">

        <header class="page-header">
            <a href="https://timlp79.github.io" class="back-link">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M13 8H3M7 4l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Portfolio
            </a>
            <div class="header-eyebrow">Utility Tool</div>
            <h1>Warranty<br><em>Calculator</em></h1>
            <p class="header-desc">Enter a purchase date to see warranty expiration windows at 1, 3, 5, and 25 years.</p>
        </header>

        <main class="page-main">

            <section class="form-section">
                <div class="form-card">
                    <label for="purchaseDate" class="field-label">Purchase Date</label>
                    <div class="field-row">
                        <input type="date" id="purchaseDate" class="date-input" required>
                        <button type="button" class="calc-btn" onclick="calculateDates(event)">
                            Calculate
                            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <p id="form-error" class="form-error hidden">Please select a purchase date before calculating.</p>
                </div>
            </section>

            <section id="result" class="results-section hidden">
                <div id="warrantyDetails"></div>
            </section>

        </main>

    </div>

    <script src="./js/app.js"></script>
</body>
</html>
